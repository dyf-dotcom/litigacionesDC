<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etapa 1 — Lista de causas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f3ef; --surface: #ffffff; --border: #dddbd4;
    --text: #1a1917; --text-sec: #6b6860; --text-hint: #9e9b94;
    --blue: #1a4f8a; --blue-light: #e8eef6;
    --purple: #4a3580; --purple-light: #edeaf6;
    --green: #1a6b4a; --green-light: #e4f0eb;
    --danger: #8a1a1a; --danger-light: #f6e4e4;
    --radius: 4px; --radius-lg: 8px;
    --font: 'IBM Plex Sans', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; padding: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; max-width: 760px; margin: 0 auto; }
  .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
  .logo { height: 56px; width: auto; }
  .header-text .card-title { font-size: 15px; font-weight: 600; }
  .header-text .card-desc { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; background: var(--blue-light); color: var(--blue); margin-bottom: 4px; }
  .card-body { padding: 1.5rem; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; }
  .toolbar input { flex: 1; font-family: var(--font); font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); }
  .toolbar input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,79,138,0.1); }
  .btn-nueva { padding: 8px 16px; font-family: var(--font); font-size: 13px; font-weight: 500; border: none; border-radius: var(--radius); background: var(--blue); color: white; cursor: pointer; white-space: nowrap; }
  .btn-nueva:hover { background: #153f70; }
  .causas-table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .col-header { display: grid; grid-template-columns: 110px 1fr 110px; gap: 10px; padding: 7px 12px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .col-header span { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.04em; }
  .causas-list { max-height: 480px; overflow-y: auto; }
  .causa-row { display: grid; grid-template-columns: 110px 1fr 110px; gap: 10px; padding: 7px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; align-items: center; }
  .causa-row:last-child { border-bottom: none; }
  .causa-row:hover { background: var(--blue-light); }
  .causa-row .nro { font-size: 13px; font-weight: 600; color: var(--blue); font-family: monospace; }
  .causa-row .depto { font-size: 12px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .estado { font-size: 11px; padding: 2px 7px; border-radius: 20px; text-align: center; font-weight: 500; display: inline-block; }
  .estado-instancia { background: var(--blue-light); color: var(--blue); }
  .estado-casacion { background: var(--purple-light); color: var(--purple); }
  .estado-corte { background: var(--green-light); color: var(--green); }
  .causas-loading { padding: 2rem; text-align: center; font-size: 13px; color: var(--text-hint); }
  .card-footer { padding: 0.75rem 1.5rem; border-top: 1px solid var(--border); background: #fafaf8; display: flex; align-items: center; justify-content: space-between; }
  .footer-count { font-size: 12px; color: var(--text-hint); }
  @media (max-width: 560px) { .col-header, .causa-row { grid-template-columns: 90px 1fr 90px; } .causa-row .depto { display: none; } .col-header span:nth-child(2) { display: none; } body { padding: 1rem; } }
</style>
</head>

9w8ha4BEnzFP5dH20w7XBaiPaXia2B4owYV+ZBOeho9p+jPr//2Q==" alt="Defensoría de Casación">
    <div class="header-text">
      <div class="badge">Etapa 1</div>
      <div class="card-title">Instancia — Causas</div>
      <div class="card-desc">Seleccioná una causa para ver o editar, o registrá una nueva</div>
    </div>
  </div>
  <div class="card-body">
    <div class="toolbar">
      <input type="text" id="buscar" placeholder="Buscar por Nro. de causa..." oninput="filtrar()">
      <button class="btn-nueva" onclick="window.location.href='etapa1_detalle.html?nuevo=1' + (new URLSearchParams(window.location.search).get('depto') ? '&depto=' + encodeURIComponent(new URLSearchParams(window.location.search).get('depto')) : '')">+ Nueva causa</button>
    </div>
    <div class="causas-table-wrap">
      <div class="col-header">
        <span>Nro. Causa</span>
        <span>Departamento</span>
        <span>Estado</span>
      </div>
      <div class="causas-list" id="causas-list">
        <div class="causas-loading">Cargando causas...</div>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <span class="footer-count" id="footer-count"></span>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzjHfYffrx41ddmPv75NDxe8g4xB2MZ4U6KWJuVFkIPwgXsbGTN9IfyqygFedLjX3xgGA/exec';

async function cargarListas() {
  try {
    const res = await fetch(`${API}?action=listas`, { redirect: 'follow' });
    const text = await res.text();
    const data = JSON.parse(text);
    if (!data.ok) return;
    const listas = data.listas;
    // Llenar cada select con su lista correspondiente
    const mapa = {
      'Materia': 'Materia',
      'Delito': 'Delito',
      'TipoCoercion': 'TipoCoercion',
      'CamaraApelacion': 'CamaraApelacion',
      'SalaTCP': 'SalaTCP',
      'ResponsableTCP': 'ResponsableTCP',
      'TipoSentenciaCasacion': 'TipoSentenciaCasacion',
      'ResultadoFinal': 'ResultadoFinal'
    };
    Object.keys(mapa).forEach(function(campo) {
      const el = document.getElementById(mapa[campo]);
      if (!el || !listas[campo]) return;
      const valActual = el.value;
      el.innerHTML = '<option value="">Seleccionar...</option>';
      listas[campo].forEach(function(op) {
        const opt = document.createElement('option');
        opt.value = op;
        opt.textContent = op;
        el.appendChild(opt);
      });
      if (valActual) el.value = valActual;
    });
  } catch(e) {
    console.error('Error cargando listas:', e);
  }
}

let todasLasCausas = [];
let causasFiltradas = [];
let deptoActivo = ''; // Departamento fijado desde index.html (?depto=)

function estadoClass(etapa) {
  if (!etapa) return 'estado-instancia';
  if (etapa.toLowerCase().includes('casaci')) return 'estado-casacion';
  if (etapa.toLowerCase().includes('corte') || etapa.toLowerCase().includes('federal')) return 'estado-corte';
  return 'estado-instancia';
}

function renderTabla(causas) {
  causasFiltradas = causas;
  const list = document.getElementById('causas-list');
  document.getElementById('footer-count').textContent = causas.length + ' causa' + (causas.length !== 1 ? 's' : '');
  if (!causas.length) {
    list.innerHTML = '<div class="causas-loading">No se encontraron causas.</div>';
    return;
  }
  list.innerHTML = causas.map((c, idx) => `
    <div class="causa-row" onclick="abrirDetalle(${idx})">
      <div class="nro">${c.NroCausa}</div>
      <div class="depto">${c.DeptoJudicial||'—'}</div>
      <div><span class="estado ${estadoClass(c.EtapaProceso)}">${c.EtapaProceso||'Instancia'}</span></div>
    </div>
  `).join('');
}

function filtrar() {
  const q = document.getElementById('buscar').value.toLowerCase();
  const deptoQ = deptoActivo.toLowerCase().trim();
  const filtradas = todasLasCausas.filter(c => {
    // 1) Filtro por departamento (si se entró desde index.html)
    if (deptoQ && String(c.DeptoJudicial||'').toLowerCase().trim() !== deptoQ) return false;
    // 2) Búsqueda libre por Nro de causa
    return String(c.NroCausa||'').toLowerCase().includes(q);
  });
  renderTabla(filtradas);
}

function abrirDetalle(idx) {
  const c = causasFiltradas[idx];
  if (!c) return;
  const params = new URLSearchParams(window.location.search);
  const depto = params.get('depto') || '';
  window.location.href = 'etapa1_detalle.html?nro=' + encodeURIComponent(c.NroCausa) + (depto ? '&depto=' + encodeURIComponent(depto) : '');
}

async function cargarCausas() {
  try {
    const res = await fetch(`${API}?action=listar`, { redirect: 'follow' });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.ok && data.causas) {
      todasLasCausas = data.causas;
      filtrar(); // aplica el filtro por departamento (y búsqueda) sobre los datos ya cargados
    } else {
      document.getElementById('causas-list').innerHTML = '<div class="causas-loading">No se pudieron cargar las causas.</div>';
    }
  } catch(e) {
    document.getElementById('causas-list').innerHTML = '<div class="causas-loading">Error al conectar: ' + e.message + '</div>';
  }
}

window.addEventListener('load', async function() {
  await cargarListas();
  // Leer parámetro ?depto= de la URL
  const params = new URLSearchParams(window.location.search);
  const depto = params.get('depto');
  if (depto) {
    deptoActivo = depto; // se filtra por DeptoJudicial, NO se ensucia el buscador
    document.title = 'Etapa 1 — ' + depto;
    document.getElementById('buscar').placeholder = 'Buscar en ' + depto + ' por Nro. o carátula...';
  }
  await cargarCausas(); // cargarCausas() ya llama a filtrar() cuando terminan de cargar los datos
});
</script>
