<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sesión cerrada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #f4f3ef; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 1.5rem; color: #1a1917; }
  .card { background: #fff; border: 1px solid #dddbd4; border-radius: 8px; padding: 2rem 2.5rem;
          text-align: center; max-width: 340px; width: 100%; }
  .icon { font-size: 2rem; margin-bottom: 1rem; }
  .title { font-size: 15px; font-weight: 600; margin-bottom: 0.5rem; }
  .desc { font-size: 13px; color: #6b6860; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <div class="title">Sesión cerrada</div>
  <div class="desc">Tu sesión fue cerrada correctamente.<br>Podés cerrar esta pestaña.</div>
</div>
<script>
  // Si llegaron acá con sesión activa (ej. recarga), limpiarla igual
  localStorage.removeItem('dc_sesion');
  sessionStorage.removeItem('causas_cache');
</script>
</body>
</html>
